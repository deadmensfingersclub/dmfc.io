<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadmen's Fingers Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <!-- 사이드바 / 모바일: 오른쪽 drawer -->
    <aside class="sidebar" id="sidebar" aria-hidden="true" aria-label="사이드바 메뉴">
      <button class="drawer-close" id="drawerClose" aria-label="메뉴 닫기">✕</button>
      <div class="logo-area">
        <div class="logo-emblem">☽</div>
        <div class="logo-title">Deadmen's<br>Fingers Club</div>
      </div>
      <nav class="nav">
        <a href="#" class="nav-item active" data-page="notice">공지사항</a>
        <a href="#" class="nav-item" data-page="worldview">세계관</a>
        <a href="#" class="nav-item" data-page="system">시스템</a>
        <a href="#" class="nav-item" data-page="application">신청서 양식</a>
        <a href="#" class="nav-item" data-page="qna">QNA</a>
      </nav>
      <div class="sidebar-footer">NEVERMORE ACADEMY</div>
    </aside>

    <!-- 오른쪽 콘텐츠 영역 -->
    <div class="main-wrap">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기" aria-expanded="false">☰</button>
      </header>
      <main class="content" id="content">
        <!-- 페이지 콘텐츠가 여기에 렌더링됩니다 -->
      </main>
    </div>
  </div>

  <!-- 모바일 drawer 오버레이 -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <script src="app.js"></script>
</body>
</html>
